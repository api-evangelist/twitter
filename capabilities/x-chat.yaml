        description: X Get Chat Conversations
        call: x-chat.getchatconversations
        with:
          max_results: rest.max_results
          pagination_token: rest.pagination_token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/2/chat/conversations/group
