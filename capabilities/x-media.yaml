        description: X Create Media Subtitles
        call: x-media.createmediasubtitles
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/2/media/upload
      name: 2-media-upload
      description: REST surface for 2-media-upload.
      operations:
      - method: GET
