naftiko: 1.0.0-alpha2
info:
  label: X Content Publishing and Management
  description: Unified workflow for creating, managing, and analyzing posts, media, bookmarks, and lists on X. Used by social
    media managers, content creators, and marketing teams.
  tags:
  - X API
  - Content
  - Publishing
  - Posts
  - Media
  - Marketing
  personas:
  - social media managers
  - content creators
  - marketing teams
  created: '2026-04-17'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    X_API_BEARER_TOKEN: X_API_BEARER_TOKEN
capability:
  consumes:
  - type: http
    namespace: x-posts
    baseUri: https://api.x.com
    description: X API v2 endpoints for posts (tweets) management.
    authentication:
      type: bearer
      token: '{{X_API_BEARER_TOKEN}}'
    resources:
    - name: posts
      path: /2
      description: Create, retrieve, and delete posts.
      operations:
      - name: createPosts
        method: POST
        path: /tweets
        description: Create a new post (tweet).
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPostsByIds
        method: GET
        path: /tweets
        description: Retrieve multiple posts by their IDs.
        inputParameters:
        - name: ids
          in: query
          type: string
          required: true
          description: Comma-separated list of post IDs
        - name: tweet.fields
          in: query
          type: string
          required: false
          description: Comma-separated list of tweet fields to return
        - name: expansions
          in: query
          type: string
          required: false
          description: Comma-separated list of expansions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletePostById
        method: DELETE
        path: /tweets/{id}
        description: Delete a post by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The ID of the post to delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: post-analytics
      path: /2
      description: Retrieve analytics and insights for posts.
      operations:
      - name: getPostsAnalytics
        method: GET
        path: /tweets/{id}/analytics
        description: Get analytics data for a specific post.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The ID of the post
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getInsights28Hr
        method: GET
        path: /insights/tweets/28hr
        description: Get post insights for the last 28 hours.
        inputParameters:
        - name: tweet.fields
          in: query
          type: string
          required: false
          description: Comma-separated list of tweet fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getInsightsHistorical
        method: GET
        path: /insights/tweets/historical
        description: Get historical post insights.
        inputParameters:
        - name: tweet.fields
          in: query
          type: string
          required: false
          description: Comma-separated list of tweet fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: post-search
      path: /2
      description: Search for posts using queries.
      operations:
      - name: searchPostsRecent
        method: POST
        path: /tweets/search/recent
        description: Search for posts from the last 7 days.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: searchPostsAll
        method: POST
        path: /tweets/search/all
        description: Search the full archive of posts.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: post-counts
      path: /2
      description: Get counts of posts matching a query.
      operations:
      - name: getPostsCountsRecent
        method: GET
        path: /tweets/counts/recent
        description: Get counts of posts matching a query from the last 7 days.
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: Search query for matching posts
        - name: granularity
          in: query
          type: string
          required: false
          description: Granularity of count results (minute, hour, day)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPostsCountsAll
        method: GET
        path: /tweets/counts/all
        description: Get counts of posts matching a query from the full archive.
        inputParameters:
        - name: query
          in: query
          type: string
          required: true
          description: Search query for matching posts
        - name: granularity
          in: query
          type: string
          required: false
          description: Granularity of count results (minute, hour, day)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: timelines
      path: /2
      description: Retrieve user timelines and mentions.
      operations:
      - name: getUserTimeline
        method: GET
        path: /users/{id}/tweets
        description: Get posts authored by a specific user.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The user ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results (1-100)
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getUserMentions
        method: GET
        path: /users/{id}/mentions
        description: Get posts mentioning a specific user.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The user ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results (1-100)
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getUserHomeTimeline
        method: GET
        path: /users/{id}/timelines/reverse_chronological
        description: Get the authenticated user's home timeline.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results (1-100)
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: post-engagement
      path: /2
      description: Get engagement data for posts.
      operations:
      - name: getPostsQuotePosts
        method: GET
        path: /tweets/{id}/quote_tweets
        description: Get posts that quote a specific post.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The post ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPostsRepostedBy
        method: GET
        path: /tweets/{id}/retweeted_by
        description: Get users who reposted a specific post.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The post ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getPostsLikingUsers
        method: GET
        path: /tweets/{id}/liking_users
        description: Get users who liked a specific post.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The post ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: post-moderation
      path: /2
      description: Moderate post replies.
      operations:
      - name: hidePostsReply
        method: PUT
        path: /tweets/{id}/hidden
        description: Hide or unhide a reply to a post.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The reply post ID
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: x-media
    baseUri: https://api.x.com
    description: X API endpoints for media upload and management.
    authentication:
      type: bearer
      token: '{{X_API_BEARER_TOKEN}}'
    resources:
    - name: upload
      path: /2
      description: Upload media via simple or chunked upload.
      operations:
      - name: mediaUpload
        method: POST
        path: /media/upload
        description: Upload media (simple upload for small files).
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: initializeMediaUpload
        method: POST
        path: /media/upload/initialize
        description: Initialize a chunked media upload.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: appendMediaUpload
        method: POST
        path: /media/upload/append
        description: Append a chunk to an in-progress media upload.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: finalizeMediaUpload
        method: POST
        path: /media/upload/finalize
        description: Finalize a chunked media upload.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getMediaUploadStatus
        method: GET
        path: /media/upload/status/{media_id}
        description: Get the processing status of an uploaded media.
        inputParameters:
        - name: media_id
          in: path
          type: string
          required: true
          description: The media ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: media-info
      path: /2
      description: Retrieve media information and analytics.
      operations:
      - name: getMediaByMediaKeys
        method: GET
        path: /media
        description: Retrieve media by media keys.
        inputParameters:
        - name: media_keys
          in: query
          type: string
          required: true
          description: Comma-separated list of media keys
        - name: media.fields
          in: query
          type: string
          required: false
          description: Comma-separated list of media fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getMediaAnalytics
        method: GET
        path: /media/{media_id}/analytics
        description: Get analytics for a specific media.
        inputParameters:
        - name: media_id
          in: path
          type: string
          required: true
          description: The media ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: media-metadata
      path: /2
      description: Manage media metadata and subtitles.
      operations:
      - name: createMediaMetadata
        method: POST
        path: /media/metadata/create
        description: Create or update metadata (alt text) for uploaded media.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createMediaSubtitles
        method: POST
        path: /media/subtitles/create
        description: Associate subtitles with uploaded media.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteMediaSubtitles
        method: DELETE
        path: /media/subtitles/delete
        description: Remove subtitles from uploaded media.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: x-bookmarks
    baseUri: https://api.x.com
    description: X API v2 endpoints for bookmarks and bookmark folders.
    authentication:
      type: bearer
      token: '{{X_API_BEARER_TOKEN}}'
    resources:
    - name: bookmarks
      path: /2
      description: Manage user bookmarks.
      operations:
      - name: getUsersBookmarks
        method: GET
        path: /users/{id}/bookmarks
        description: Get bookmarked posts for the authenticated user.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        - name: tweet.fields
          in: query
          type: string
          required: false
          description: Comma-separated list of tweet fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createUsersBookmark
        method: POST
        path: /users/{id}/bookmarks
        description: Bookmark a post.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteUsersBookmark
        method: DELETE
        path: /users/{id}/bookmarks/{tweet_id}
        description: Remove a bookmark.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        - name: tweet_id
          in: path
          type: string
          required: true
          description: The post ID to unbookmark
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: bookmark-folders
      path: /2
      description: Manage bookmark folders.
      operations:
      - name: getUsersBookmarkFolders
        method: GET
        path: /users/{id}/bookmarks/folders
        description: Get bookmark folders for the authenticated user.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getUsersBookmarksByFolderId
        method: GET
        path: /users/{id}/bookmarks/folders/{folder_id}
        description: Get bookmarked posts in a specific folder.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        - name: folder_id
          in: path
          type: string
          required: true
          description: The bookmark folder ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  - type: http
    namespace: x-lists
    baseUri: https://api.x.com
    description: X API v2 endpoints for list management.
    authentication:
      type: bearer
      token: '{{X_API_BEARER_TOKEN}}'
    resources:
    - name: lists
      path: /2
      description: Create, retrieve, update, and delete lists.
      operations:
      - name: createLists
        method: POST
        path: /lists
        description: Create a new list.
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getListsById
        method: GET
        path: /lists/{id}
        description: Get a list by its ID.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The list ID
        - name: list.fields
          in: query
          type: string
          required: false
          description: Comma-separated list of list fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateLists
        method: PUT
        path: /lists/{id}
        description: Update a list's name or description.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The list ID
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deleteLists
        method: DELETE
        path: /lists/{id}
        description: Delete a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The list ID to delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-members
      path: /2
      description: Manage list members.
      operations:
      - name: getListsMembers
        method: GET
        path: /lists/{id}/members
        description: Get the members of a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The list ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: addListsMember
        method: POST
        path: /lists/{id}/members
        description: Add a member to a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The list ID
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: removeListsMemberByUserId
        method: DELETE
        path: /lists/{id}/members/{user_id}
        description: Remove a member from a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The list ID
        - name: user_id
          in: path
          type: string
          required: true
          description: The user ID to remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-followers
      path: /2
      description: Get list followers.
      operations:
      - name: getListsFollowers
        method: GET
        path: /lists/{id}/followers
        description: Get users who follow a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The list ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-follows
      path: /2
      description: Follow and unfollow lists.
      operations:
      - name: followList
        method: POST
        path: /users/{id}/followed_lists
        description: Follow a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: unfollowList
        method: DELETE
        path: /users/{id}/followed_lists/{list_id}
        description: Unfollow a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        - name: list_id
          in: path
          type: string
          required: true
          description: The list ID to unfollow
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-pins
      path: /2
      description: Pin and unpin lists.
      operations:
      - name: pinList
        method: POST
        path: /users/{id}/pinned_lists
        description: Pin a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        body:
          type: json
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: unpinList
        method: DELETE
        path: /users/{id}/pinned_lists/{list_id}
        description: Unpin a list.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The authenticated user ID
        - name: list_id
          in: path
          type: string
          required: true
          description: The list ID to unpin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: list-posts
      path: /2
      description: Get posts from a list timeline.
      operations:
      - name: getListsPosts
        method: GET
        path: /lists/{id}/tweets
        description: Get posts from a list's timeline.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The list ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: user-lists
      path: /2
      description: Get lists associated with a user.
      operations:
      - name: getUserOwnedLists
        method: GET
        path: /users/{id}/owned_lists
        description: Get lists owned by a user.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The user ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getUserListMemberships
        method: GET
        path: /users/{id}/list_memberships
        description: Get lists a user is a member of.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The user ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getUserFollowedLists
        method: GET
        path: /users/{id}/followed_lists
        description: Get lists a user follows.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The user ID
        - name: max_results
          in: query
          type: integer
          required: false
          description: Maximum number of results
        - name: pagination_token
          in: query
          type: string
          required: false
          description: Token for pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: getUserPinnedLists
        method: GET
        path: /users/{id}/pinned_lists
        description: Get lists pinned by a user.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
          description: The user ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: x-content-api
    resources:
    - path: /v1/content/posts
      name: posts
      description: Create and retrieve posts
      operations:
      - method: POST
        name: createPosts
        description: Create a new post
        call: x-content-api.createPosts
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: getPostsByIds
        description: Retrieve posts by IDs
        call: x-content-api.getPostsByIds
        with:
          ids: rest.ids
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/content/posts/{id}
      name: post
      description: Manage a specific post
      operations:
      - method: DELETE
        name: deletePostById
        description: Delete a post
        call: x-content-api.deletePostById
        with:
