  description: 'X API v2 — Account Activity. 6 operations. Lead operation: X Create Replay Job. Self-contained Naftiko capability
    covering one Twitter business surface.'
  tags:
  - Twitter
  - Account Activity
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TWITTER_API_KEY: TWITTER_API_KEY
capability:
