      - method: POST
        name: createaccountactivityreplayjob
        description: X Create Replay Job
        call: x-account-activity.createaccountactivityreplayjob
        with:
          webhook_id: rest.webhook_id
          from_date: rest.from_date
          to_date: rest.to_date
        outputParameters:
        - type: object
          mapping: $.
