      type: bearer
      token: '{{env.TWITTER_API_KEY}}'
  exposes:
  - type: rest
    namespace: x-account-activity-rest
    port: 8080
    description: REST adapter for X API v2 — Account Activity. One Spectral-compliant resource per consumed operation, prefixed
