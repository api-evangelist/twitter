      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: x-create-replay-job-webhook
      description: X Create Replay Job for Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: x-webhooks.createwebhookreplayjob
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: x-delete-webhook
      description: X Delete Webhook
      hints:
