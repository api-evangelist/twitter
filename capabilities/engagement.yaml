    - name: searchSpaces
      description: Search for Spaces by keyword
      hints:
        readOnly: true
        idempotent: true
      call: x-engagement-mcp.searchSpaces
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: getSpacesByIds
      description: Retrieve multiple Spaces by their IDs
      hints:
        readOnly: true
        idempotent: true
      call: x-engagement-mcp.getSpacesByIds
      with:
        ids: tools.ids
      outputParameters:
      - type: object
        mapping: $.
    - name: getSpacesPosts
      description: Get posts shared in a Space
      hints:
        readOnly: true
        idempotent: true
      call: x-engagement-mcp.getSpacesPosts
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
