naftiko: "1.0.0-alpha1"

info:
  label: "X Engagement and Community Management"
  description: "Unified workflow for managing user relationships, direct messages, spaces, and community interactions on X. Used by community managers, customer support teams, and engagement specialists."
  tags:
    - X API
    - Engagement
    - Community
    - Direct Messages
    - Spaces
  personas:
    - community managers
    - customer support
    - engagement specialists
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      X_API_BEARER_TOKEN: X_API_BEARER_TOKEN

capability:
  consumes:
    - import: x-users
      location: "./shared/users.yaml"
    - import: x-direct-messages
      location: "./shared/direct-messages.yaml"
    - import: x-spaces
      location: "./shared/spaces.yaml"

  exposes:
    - type: rest
      port: 8082
      namespace: x-engagement-api
      resources:
        - path: /v1/engagement/users/{id}/following
          name: following
          description: "Manage following"
          operations:
            - method: POST
              name: followUser
              description: "Follow a user"
              call: "x-engagement-api.followUser"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/users/{source_user_id}/following/{target_user_id}
          name: unfollow
          description: "Unfollow a user"
          operations:
            - method: DELETE
              name: unfollowUser
              description: "Unfollow a user"
              call: "x-engagement-api.unfollowUser"
              with:
                source_user_id: "rest.source_user_id"
                target_user_id: "rest.target_user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/users/{id}/blocking
          name: blocking
          description: "Manage blocks"
          operations:
            - method: POST
              name: blockUsers
              description: "Block a user"
              call: "x-engagement-api.blockUsers"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/users/{source_user_id}/blocking/{target_user_id}
          name: unblock
          description: "Unblock a user"
          operations:
            - method: DELETE
              name: unblockUsers
              description: "Unblock a user"
              call: "x-engagement-api.unblockUsers"
              with:
                source_user_id: "rest.source_user_id"
                target_user_id: "rest.target_user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/users/{id}/muting
          name: muting
          description: "Manage mutes"
          operations:
            - method: POST
              name: muteUser
              description: "Mute a user"
              call: "x-engagement-api.muteUser"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/users/{source_user_id}/muting/{target_user_id}
          name: unmute
          description: "Unmute a user"
          operations:
            - method: DELETE
              name: unmuteUser
              description: "Unmute a user"
              call: "x-engagement-api.unmuteUser"
              with:
                source_user_id: "rest.source_user_id"
                target_user_id: "rest.target_user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/dm/conversations
          name: dm-conversations
          description: "Create DM conversations"
          operations:
            - method: POST
              name: createDirectMessagesConversation
              description: "Create a new group DM conversation"
              call: "x-engagement-api.createDirectMessagesConversation"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/dm/conversations/{dm_conversation_id}/messages
          name: dm-by-conversation
          description: "Send DM to a conversation"
          operations:
            - method: POST
              name: createDirectMessagesByConversationId
              description: "Send a DM to an existing conversation"
              call: "x-engagement-api.createDirectMessagesByConversationId"
              with:
                dm_conversation_id: "rest.dm_conversation_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/dm/events
          name: dm-events
          description: "Get DM events"
          operations:
            - method: GET
              name: getDirectMessagesEvents
              description: "Get recent DM events"
              call: "x-engagement-api.getDirectMessagesEvents"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/spaces/search
          name: spaces-search
          description: "Search Spaces"
          operations:
            - method: GET
              name: searchSpaces
              description: "Search for Spaces by keyword"
              call: "x-engagement-api.searchSpaces"
              with:
                query: "rest.query"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/engagement/spaces
          name: spaces
          description: "Retrieve Spaces by IDs"
          operations:
            - method: GET
              name: getSpacesByIds
              description: "Get multiple Spaces by IDs"
              call: "x-engagement-api.getSpacesByIds"
              with:
                ids: "rest.ids"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9082
      namespace: x-engagement-mcp
      transport: http
      tools:
        - name: followUser
          description: "Follow a user"
          hints:
            readOnly: false
            idempotent: false
          call: "x-engagement-mcp.followUser"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unfollowUser
          description: "Unfollow a user"
          hints:
            readOnly: false
            destructive: true
          call: "x-engagement-mcp.unfollowUser"
          with:
            source_user_id: "tools.source_user_id"
            target_user_id: "tools.target_user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: blockUsers
          description: "Block a user"
          hints:
            readOnly: false
            idempotent: false
          call: "x-engagement-mcp.blockUsers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unblockUsers
          description: "Unblock a user"
          hints:
            readOnly: false
            destructive: true
          call: "x-engagement-mcp.unblockUsers"
          with:
            source_user_id: "tools.source_user_id"
            target_user_id: "tools.target_user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getBlockedUsers
          description: "Get users blocked by the authenticated user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-engagement-mcp.getBlockedUsers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: muteUser
          description: "Mute a user"
          hints:
            readOnly: false
            idempotent: false
          call: "x-engagement-mcp.muteUser"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unmuteUser
          description: "Unmute a user"
          hints:
            readOnly: false
            destructive: true
          call: "x-engagement-mcp.unmuteUser"
          with:
            source_user_id: "tools.source_user_id"
            target_user_id: "tools.target_user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getMutedUsers
          description: "Get users muted by the authenticated user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-engagement-mcp.getMutedUsers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: createDirectMessagesConversation
          description: "Create a new group DM conversation"
          hints:
            readOnly: false
            idempotent: false
          call: "x-engagement-mcp.createDirectMessagesConversation"
          outputParameters:
            - type: object
              mapping: "$."
        - name: createDirectMessagesByParticipantId
          description: "Send a direct message to a user by participant ID"
          hints:
            readOnly: false
            idempotent: false
          call: "x-engagement-mcp.createDirectMessagesByParticipantId"
          with:
            participant_id: "tools.participant_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: createDirectMessagesByConversationId
          description: "Send a direct message to an existing conversation"
          hints:
            readOnly: false
            idempotent: false
          call: "x-engagement-mcp.createDirectMessagesByConversationId"
          with:
            dm_conversation_id: "tools.dm_conversation_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getDirectMessagesEvents
          description: "Get recent DM events for the authenticated user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-engagement-mcp.getDirectMessagesEvents"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getDirectMessagesEventsByConversationId
          description: "Get DM events for a specific conversation"
          hints:
            readOnly: true
            idempotent: true
          call: "x-engagement-mcp.getDirectMessagesEventsByConversationId"
          with:
            dm_conversation_id: "tools.dm_conversation_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: searchSpaces
          description: "Search for Spaces by keyword"
          hints:
            readOnly: true
            idempotent: true
          call: "x-engagement-mcp.searchSpaces"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getSpacesByIds
          description: "Retrieve multiple Spaces by their IDs"
          hints:
            readOnly: true
            idempotent: true
          call: "x-engagement-mcp.getSpacesByIds"
          with:
            ids: "tools.ids"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getSpacesPosts
          description: "Get posts shared in a Space"
          hints:
            readOnly: true
            idempotent: true
          call: "x-engagement-mcp.getSpacesPosts"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
