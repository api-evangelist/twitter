naftiko: "1.0.0-alpha1"

info:
  label: "X API Media"
  description: "Upload, manage, and retrieve media on X, including chunked uploads, metadata, subtitles, and analytics."
  tags:
    - X API
    - Media
    - Upload
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      X_API_BEARER_TOKEN: X_API_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: x-media
      baseUri: https://api.x.com
      description: "X API endpoints for media upload and management."
      authentication:
        type: bearer
        token: "{{X_API_BEARER_TOKEN}}"
      resources:
        - name: upload
          path: /2
          description: "Upload media via simple or chunked upload."
          operations:
            - name: mediaUpload
              method: POST
              path: /media/upload
              description: "Upload media (simple upload for small files)."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: initializeMediaUpload
              method: POST
              path: /media/upload/initialize
              description: "Initialize a chunked media upload."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: appendMediaUpload
              method: POST
              path: /media/upload/append
              description: "Append a chunk to an in-progress media upload."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: finalizeMediaUpload
              method: POST
              path: /media/upload/finalize
              description: "Finalize a chunked media upload."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getMediaUploadStatus
              method: GET
              path: /media/upload/status/{media_id}
              description: "Get the processing status of an uploaded media."
              inputParameters:
                - name: media_id
                  in: path
                  type: string
                  required: true
                  description: "The media ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: media-info
          path: /2
          description: "Retrieve media information and analytics."
          operations:
            - name: getMediaByMediaKeys
              method: GET
              path: /media
              description: "Retrieve media by media keys."
              inputParameters:
                - name: media_keys
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated list of media keys"
                - name: media.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of media fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getMediaAnalytics
              method: GET
              path: /media/{media_id}/analytics
              description: "Get analytics for a specific media."
              inputParameters:
                - name: media_id
                  in: path
                  type: string
                  required: true
                  description: "The media ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: media-metadata
          path: /2
          description: "Manage media metadata and subtitles."
          operations:
            - name: createMediaMetadata
              method: POST
              path: /media/metadata/create
              description: "Create or update metadata (alt text) for uploaded media."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createMediaSubtitles
              method: POST
              path: /media/subtitles/create
              description: "Associate subtitles with uploaded media."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteMediaSubtitles
              method: DELETE
              path: /media/subtitles/delete
              description: "Remove subtitles from uploaded media."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8106
      namespace: x-media-rest
      resources:
        - path: /v1/media/upload
          name: upload
          description: "Simple media upload"
          operations:
            - method: POST
              name: mediaUpload
              description: "Upload media"
              call: "x-media.mediaUpload"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/media/upload/initialize
          name: upload-init
          description: "Initialize chunked upload"
          operations:
            - method: POST
              name: initializeMediaUpload
              description: "Initialize a chunked media upload"
              call: "x-media.initializeMediaUpload"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/media/upload/append
          name: upload-append
          description: "Append upload chunk"
          operations:
            - method: POST
              name: appendMediaUpload
              description: "Append a chunk to media upload"
              call: "x-media.appendMediaUpload"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/media/upload/finalize
          name: upload-finalize
          description: "Finalize chunked upload"
          operations:
            - method: POST
              name: finalizeMediaUpload
              description: "Finalize a chunked media upload"
              call: "x-media.finalizeMediaUpload"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/media/upload/status/{media_id}
          name: upload-status
          description: "Get upload status"
          operations:
            - method: GET
              name: getMediaUploadStatus
              description: "Get media processing status"
              call: "x-media.getMediaUploadStatus"
              with:
                media_id: "rest.media_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/media
          name: media
          description: "Retrieve media by keys"
          operations:
            - method: GET
              name: getMediaByMediaKeys
              description: "Get media by media keys"
              call: "x-media.getMediaByMediaKeys"
              with:
                media_keys: "rest.media_keys"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/media/{media_id}/analytics
          name: media-analytics
          description: "Get media analytics"
          operations:
            - method: GET
              name: getMediaAnalytics
              description: "Get analytics for media"
              call: "x-media.getMediaAnalytics"
              with:
                media_id: "rest.media_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/media/metadata
          name: media-metadata
          description: "Create media metadata"
          operations:
            - method: POST
              name: createMediaMetadata
              description: "Create or update media metadata"
              call: "x-media.createMediaMetadata"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/media/subtitles
          name: media-subtitles
          description: "Manage media subtitles"
          operations:
            - method: POST
              name: createMediaSubtitles
              description: "Associate subtitles with media"
              call: "x-media.createMediaSubtitles"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: deleteMediaSubtitles
              description: "Remove subtitles from media"
              call: "x-media.deleteMediaSubtitles"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9106
      namespace: x-media-mcp
      transport: http
      tools:
        - name: mediaUpload
          description: "Upload media (simple upload for small files)"
          hints:
            readOnly: false
            idempotent: false
          call: "x-media.mediaUpload"
          outputParameters:
            - type: object
              mapping: "$."
        - name: initializeMediaUpload
          description: "Initialize a chunked media upload"
          hints:
            readOnly: false
            idempotent: false
          call: "x-media.initializeMediaUpload"
          outputParameters:
            - type: object
              mapping: "$."
        - name: appendMediaUpload
          description: "Append a chunk to an in-progress media upload"
          hints:
            readOnly: false
            idempotent: true
          call: "x-media.appendMediaUpload"
          outputParameters:
            - type: object
              mapping: "$."
        - name: finalizeMediaUpload
          description: "Finalize a chunked media upload"
          hints:
            readOnly: false
            idempotent: false
          call: "x-media.finalizeMediaUpload"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getMediaUploadStatus
          description: "Get the processing status of an uploaded media"
          hints:
            readOnly: true
            idempotent: true
          call: "x-media.getMediaUploadStatus"
          with:
            media_id: "tools.media_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getMediaByMediaKeys
          description: "Retrieve media by media keys"
          hints:
            readOnly: true
            idempotent: true
          call: "x-media.getMediaByMediaKeys"
          with:
            media_keys: "tools.media_keys"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getMediaAnalytics
          description: "Get analytics for a specific media"
          hints:
            readOnly: true
            idempotent: true
          call: "x-media.getMediaAnalytics"
          with:
            media_id: "tools.media_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: createMediaMetadata
          description: "Create or update metadata (alt text) for uploaded media"
          hints:
            readOnly: false
            idempotent: true
          call: "x-media.createMediaMetadata"
          outputParameters:
            - type: object
              mapping: "$."
        - name: createMediaSubtitles
          description: "Associate subtitles with uploaded media"
          hints:
            readOnly: false
            idempotent: true
          call: "x-media.createMediaSubtitles"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deleteMediaSubtitles
          description: "Remove subtitles from uploaded media"
          hints:
            readOnly: false
            destructive: true
          call: "x-media.deleteMediaSubtitles"
          outputParameters:
            - type: object
              mapping: "$."
