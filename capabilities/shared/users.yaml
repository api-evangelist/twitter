naftiko: "1.0.0-alpha1"

info:
  label: "X API Users"
  description: "Retrieve user profiles, manage follows, blocks, and mutes on X."
  tags:
    - X API
    - Users
    - Profiles
    - Connections
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      X_API_BEARER_TOKEN: X_API_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: x-users
      baseUri: https://api.x.com
      description: "X API v2 endpoints for user management, follows, blocks, and mutes."
      authentication:
        type: bearer
        token: "{{X_API_BEARER_TOKEN}}"
      resources:
        - name: users
          path: /2
          description: "Look up users by ID, username, or authenticated user."
          operations:
            - name: getUsersByIds
              method: GET
              path: /users
              description: "Retrieve multiple users by their IDs."
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated list of user IDs"
                - name: user.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of user fields to return"
                - name: expansions
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of expansions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUsersByUsernames
              method: GET
              path: /users/by
              description: "Retrieve multiple users by their usernames."
              inputParameters:
                - name: usernames
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated list of usernames"
                - name: user.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of user fields to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUsersByUsername
              method: GET
              path: /users/by/username/{username}
              description: "Retrieve a single user by username."
              inputParameters:
                - name: username
                  in: path
                  type: string
                  required: true
                  description: "The username to look up"
                - name: user.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of user fields to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUsersMe
              method: GET
              path: /users/me
              description: "Retrieve the authenticated user's profile."
              inputParameters:
                - name: user.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of user fields to return"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: follows
          path: /2
          description: "Manage follow relationships."
          operations:
            - name: followUser
              method: POST
              path: /users/{id}/following
              description: "Follow a user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unfollowUser
              method: DELETE
              path: /users/{source_user_id}/following/{target_user_id}
              description: "Unfollow a user."
              inputParameters:
                - name: source_user_id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
                - name: target_user_id
                  in: path
                  type: string
                  required: true
                  description: "The user ID to unfollow"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getFollowers
              method: GET
              path: /users/{id}/followers
              description: "Get followers of a user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (1-1000)"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getFollowing
              method: GET
              path: /users/{id}/following
              description: "Get users that a user is following."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (1-1000)"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: blocks
          path: /2
          description: "Manage block relationships."
          operations:
            - name: blockUsers
              method: POST
              path: /users/{id}/blocking
              description: "Block a user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unblockUsers
              method: DELETE
              path: /users/{source_user_id}/blocking/{target_user_id}
              description: "Unblock a user."
              inputParameters:
                - name: source_user_id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
                - name: target_user_id
                  in: path
                  type: string
                  required: true
                  description: "The user ID to unblock"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getBlockedUsers
              method: GET
              path: /users/{id}/blocking
              description: "Get users blocked by the authenticated user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: mutes
          path: /2
          description: "Manage mute relationships."
          operations:
            - name: muteUser
              method: POST
              path: /users/{id}/muting
              description: "Mute a user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unmuteUser
              method: DELETE
              path: /users/{source_user_id}/muting/{target_user_id}
              description: "Unmute a user."
              inputParameters:
                - name: source_user_id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
                - name: target_user_id
                  in: path
                  type: string
                  required: true
                  description: "The user ID to unmute"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getMutedUsers
              method: GET
              path: /users/{id}/muting
              description: "Get users muted by the authenticated user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: x-users-rest
      resources:
        - path: /v1/users
          name: users
          description: "Look up users by IDs"
          operations:
            - method: GET
              name: getUsersByIds
              description: "Retrieve users by IDs"
              call: "x-users.getUsersByIds"
              with:
                ids: "rest.ids"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/by
          name: users-by-usernames
          description: "Look up users by usernames"
          operations:
            - method: GET
              name: getUsersByUsernames
              description: "Retrieve users by usernames"
              call: "x-users.getUsersByUsernames"
              with:
                usernames: "rest.usernames"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/by/username/{username}
          name: user-by-username
          description: "Look up a user by username"
          operations:
            - method: GET
              name: getUsersByUsername
              description: "Retrieve a user by username"
              call: "x-users.getUsersByUsername"
              with:
                username: "rest.username"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/me
          name: users-me
          description: "Get authenticated user"
          operations:
            - method: GET
              name: getUsersMe
              description: "Get authenticated user profile"
              call: "x-users.getUsersMe"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/following
          name: following
          description: "Manage following"
          operations:
            - method: POST
              name: followUser
              description: "Follow a user"
              call: "x-users.followUser"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: getFollowing
              description: "Get users being followed"
              call: "x-users.getFollowing"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{source_user_id}/following/{target_user_id}
          name: unfollow
          description: "Unfollow a user"
          operations:
            - method: DELETE
              name: unfollowUser
              description: "Unfollow a user"
              call: "x-users.unfollowUser"
              with:
                source_user_id: "rest.source_user_id"
                target_user_id: "rest.target_user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/followers
          name: followers
          description: "Get followers"
          operations:
            - method: GET
              name: getFollowers
              description: "Get user followers"
              call: "x-users.getFollowers"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/blocking
          name: blocking
          description: "Manage blocks"
          operations:
            - method: POST
              name: blockUsers
              description: "Block a user"
              call: "x-users.blockUsers"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: getBlockedUsers
              description: "Get blocked users"
              call: "x-users.getBlockedUsers"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{source_user_id}/blocking/{target_user_id}
          name: unblock
          description: "Unblock a user"
          operations:
            - method: DELETE
              name: unblockUsers
              description: "Unblock a user"
              call: "x-users.unblockUsers"
              with:
                source_user_id: "rest.source_user_id"
                target_user_id: "rest.target_user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/muting
          name: muting
          description: "Manage mutes"
          operations:
            - method: POST
              name: muteUser
              description: "Mute a user"
              call: "x-users.muteUser"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: getMutedUsers
              description: "Get muted users"
              call: "x-users.getMutedUsers"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{source_user_id}/muting/{target_user_id}
          name: unmute
          description: "Unmute a user"
          operations:
            - method: DELETE
              name: unmuteUser
              description: "Unmute a user"
              call: "x-users.unmuteUser"
              with:
                source_user_id: "rest.source_user_id"
                target_user_id: "rest.target_user_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: x-users-mcp
      transport: http
      tools:
        - name: getUsersByIds
          description: "Retrieve multiple users by their IDs"
          hints:
            readOnly: true
            idempotent: true
          call: "x-users.getUsersByIds"
          with:
            ids: "tools.ids"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUsersByUsernames
          description: "Retrieve multiple users by their usernames"
          hints:
            readOnly: true
            idempotent: true
          call: "x-users.getUsersByUsernames"
          with:
            usernames: "tools.usernames"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUsersByUsername
          description: "Retrieve a single user by username"
          hints:
            readOnly: true
            idempotent: true
          call: "x-users.getUsersByUsername"
          with:
            username: "tools.username"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUsersMe
          description: "Retrieve the authenticated user's profile"
          hints:
            readOnly: true
            idempotent: true
          call: "x-users.getUsersMe"
          outputParameters:
            - type: object
              mapping: "$."
        - name: followUser
          description: "Follow a user"
          hints:
            readOnly: false
            idempotent: false
          call: "x-users.followUser"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unfollowUser
          description: "Unfollow a user"
          hints:
            readOnly: false
            destructive: true
          call: "x-users.unfollowUser"
          with:
            source_user_id: "tools.source_user_id"
            target_user_id: "tools.target_user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getFollowers
          description: "Get followers of a user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-users.getFollowers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getFollowing
          description: "Get users that a user is following"
          hints:
            readOnly: true
            idempotent: true
          call: "x-users.getFollowing"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: blockUsers
          description: "Block a user"
          hints:
            readOnly: false
            idempotent: false
          call: "x-users.blockUsers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unblockUsers
          description: "Unblock a user"
          hints:
            readOnly: false
            destructive: true
          call: "x-users.unblockUsers"
          with:
            source_user_id: "tools.source_user_id"
            target_user_id: "tools.target_user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getBlockedUsers
          description: "Get users blocked by the authenticated user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-users.getBlockedUsers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: muteUser
          description: "Mute a user"
          hints:
            readOnly: false
            idempotent: false
          call: "x-users.muteUser"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unmuteUser
          description: "Unmute a user"
          hints:
            readOnly: false
            destructive: true
          call: "x-users.unmuteUser"
          with:
            source_user_id: "tools.source_user_id"
            target_user_id: "tools.target_user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getMutedUsers
          description: "Get users muted by the authenticated user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-users.getMutedUsers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
