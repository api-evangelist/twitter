naftiko: "1.0.0-alpha1"

info:
  label: "X API Streaming"
  description: "Real-time streaming endpoints for posts, compliance, likes, and labels on X, including firehose, sample, and filtered search streams."
  tags:
    - X API
    - Streaming
    - Real-Time
    - Firehose
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      X_API_BEARER_TOKEN: X_API_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: x-streaming
      baseUri: https://api.x.com
      description: "X API v2 streaming endpoints for real-time data access."
      authentication:
        type: bearer
        token: "{{X_API_BEARER_TOKEN}}"
      resources:
        - name: post-streams
          path: /2
          description: "Stream posts in real-time via firehose, sample, and filtered search."
          operations:
            - name: streamPostsFirehose
              method: GET
              path: /tweets/firehose/stream
              description: "Stream all public posts in real-time via the firehose."
              inputParameters:
                - name: partition
                  in: query
                  type: integer
                  required: true
                  description: "The partition number"
                - name: tweet.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of tweet fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: streamPostsFirehoseEn
              method: GET
              path: /tweets/firehose/stream/lang/en
              description: "Stream all public English-language posts in real-time."
              inputParameters:
                - name: partition
                  in: query
                  type: integer
                  required: true
                  description: "The partition number"
                - name: tweet.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of tweet fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: streamPostsSample10
              method: GET
              path: /tweets/sample10/stream
              description: "Stream a 10% sample of all public posts in real-time."
              inputParameters:
                - name: partition
                  in: query
                  type: integer
                  required: true
                  description: "The partition number"
                - name: tweet.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of tweet fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: streamPostsSample1
              method: GET
              path: /tweets/sample/stream
              description: "Stream a roughly 1% sample of all public posts in real-time."
              inputParameters:
                - name: tweet.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of tweet fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: streamPostsSearch
              method: GET
              path: /tweets/search/stream
              description: "Stream posts matching filtered stream rules in real-time."
              inputParameters:
                - name: tweet.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of tweet fields"
                - name: expansions
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of expansions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: stream-rules
          path: /2
          description: "Manage filtered stream rules."
          operations:
            - name: addSearchStreamRules
              method: POST
              path: /tweets/search/stream/rules
              description: "Add or delete rules for the filtered search stream."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getSearchStreamRules
              method: GET
              path: /tweets/search/stream/rules
              description: "Get the current rules for the filtered search stream."
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of rule IDs to retrieve"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: compliance-streams
          path: /2
          description: "Stream compliance events for users, posts, likes, and labels."
          operations:
            - name: streamUsersCompliance
              method: GET
              path: /users/compliance/stream
              description: "Stream user compliance events in real-time."
              inputParameters:
                - name: partition
                  in: query
                  type: integer
                  required: true
                  description: "The partition number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: streamPostsCompliance
              method: GET
              path: /tweets/compliance/stream
              description: "Stream post compliance events in real-time."
              inputParameters:
                - name: partition
                  in: query
                  type: integer
                  required: true
                  description: "The partition number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: streamLikesFirehose
              method: GET
              path: /likes/firehose/stream
              description: "Stream all likes in real-time via the firehose."
              inputParameters:
                - name: partition
                  in: query
                  type: integer
                  required: true
                  description: "The partition number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: streamLikesCompliance
              method: GET
              path: /likes/compliance/stream
              description: "Stream likes compliance events in real-time."
              inputParameters:
                - name: partition
                  in: query
                  type: integer
                  required: true
                  description: "The partition number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: streamLabelsCompliance
              method: GET
              path: /labels/compliance/stream
              description: "Stream labels compliance events in real-time."
              inputParameters:
                - name: partition
                  in: query
                  type: integer
                  required: true
                  description: "The partition number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: x-streaming-rest
      resources:
        - path: /v1/streams/firehose
          name: firehose
          description: "Full firehose stream"
          operations:
            - method: GET
              name: streamPostsFirehose
              description: "Stream all public posts"
              call: "x-streaming.streamPostsFirehose"
              with:
                partition: "rest.partition"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/firehose/en
          name: firehose-en
          description: "English firehose stream"
          operations:
            - method: GET
              name: streamPostsFirehoseEn
              description: "Stream English-language posts"
              call: "x-streaming.streamPostsFirehoseEn"
              with:
                partition: "rest.partition"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/sample10
          name: sample10
          description: "10% sample stream"
          operations:
            - method: GET
              name: streamPostsSample10
              description: "Stream 10% sample of posts"
              call: "x-streaming.streamPostsSample10"
              with:
                partition: "rest.partition"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/sample
          name: sample1
          description: "1% sample stream"
          operations:
            - method: GET
              name: streamPostsSample1
              description: "Stream 1% sample of posts"
              call: "x-streaming.streamPostsSample1"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/search
          name: search-stream
          description: "Filtered search stream"
          operations:
            - method: GET
              name: streamPostsSearch
              description: "Stream posts matching filter rules"
              call: "x-streaming.streamPostsSearch"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/search/rules
          name: stream-rules
          description: "Manage stream filter rules"
          operations:
            - method: POST
              name: addSearchStreamRules
              description: "Add or delete stream rules"
              call: "x-streaming.addSearchStreamRules"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: getSearchStreamRules
              description: "Get current stream rules"
              call: "x-streaming.getSearchStreamRules"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/compliance/users
          name: users-compliance
          description: "User compliance stream"
          operations:
            - method: GET
              name: streamUsersCompliance
              description: "Stream user compliance events"
              call: "x-streaming.streamUsersCompliance"
              with:
                partition: "rest.partition"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/compliance/posts
          name: posts-compliance
          description: "Post compliance stream"
          operations:
            - method: GET
              name: streamPostsCompliance
              description: "Stream post compliance events"
              call: "x-streaming.streamPostsCompliance"
              with:
                partition: "rest.partition"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/likes/firehose
          name: likes-firehose
          description: "Likes firehose stream"
          operations:
            - method: GET
              name: streamLikesFirehose
              description: "Stream all likes"
              call: "x-streaming.streamLikesFirehose"
              with:
                partition: "rest.partition"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/compliance/likes
          name: likes-compliance
          description: "Likes compliance stream"
          operations:
            - method: GET
              name: streamLikesCompliance
              description: "Stream likes compliance events"
              call: "x-streaming.streamLikesCompliance"
              with:
                partition: "rest.partition"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/streams/compliance/labels
          name: labels-compliance
          description: "Labels compliance stream"
          operations:
            - method: GET
              name: streamLabelsCompliance
              description: "Stream labels compliance events"
              call: "x-streaming.streamLabelsCompliance"
              with:
                partition: "rest.partition"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: x-streaming-mcp
      transport: http
      tools:
        - name: streamPostsFirehose
          description: "Stream all public posts in real-time via the firehose"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamPostsFirehose"
          with:
            partition: "tools.partition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamPostsFirehoseEn
          description: "Stream all public English-language posts in real-time"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamPostsFirehoseEn"
          with:
            partition: "tools.partition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamPostsSample10
          description: "Stream a 10% sample of all public posts in real-time"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamPostsSample10"
          with:
            partition: "tools.partition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamPostsSample1
          description: "Stream a 1% sample of all public posts in real-time"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamPostsSample1"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamPostsSearch
          description: "Stream posts matching filtered stream rules in real-time"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamPostsSearch"
          outputParameters:
            - type: object
              mapping: "$."
        - name: addSearchStreamRules
          description: "Add or delete rules for the filtered search stream"
          hints:
            readOnly: false
            idempotent: false
          call: "x-streaming.addSearchStreamRules"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getSearchStreamRules
          description: "Get current rules for the filtered search stream"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.getSearchStreamRules"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamUsersCompliance
          description: "Stream user compliance events in real-time"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamUsersCompliance"
          with:
            partition: "tools.partition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamPostsCompliance
          description: "Stream post compliance events in real-time"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamPostsCompliance"
          with:
            partition: "tools.partition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamLikesFirehose
          description: "Stream all likes in real-time via the firehose"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamLikesFirehose"
          with:
            partition: "tools.partition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamLikesCompliance
          description: "Stream likes compliance events in real-time"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamLikesCompliance"
          with:
            partition: "tools.partition"
          outputParameters:
            - type: object
              mapping: "$."
        - name: streamLabelsCompliance
          description: "Stream labels compliance events in real-time"
          hints:
            readOnly: true
            idempotent: true
          call: "x-streaming.streamLabelsCompliance"
          with:
            partition: "tools.partition"
          outputParameters:
            - type: object
              mapping: "$."
