naftiko: "1.0.0-alpha1"

info:
  label: "X API Lists"
  description: "Create, manage, and interact with lists on X, including members, followers, pins, and list timelines."
  tags:
    - X API
    - Lists
    - Curation
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      X_API_BEARER_TOKEN: X_API_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: x-lists
      baseUri: https://api.x.com
      description: "X API v2 endpoints for list management."
      authentication:
        type: bearer
        token: "{{X_API_BEARER_TOKEN}}"
      resources:
        - name: lists
          path: /2
          description: "Create, retrieve, update, and delete lists."
          operations:
            - name: createLists
              method: POST
              path: /lists
              description: "Create a new list."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getListsById
              method: GET
              path: /lists/{id}
              description: "Get a list by its ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The list ID"
                - name: list.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of list fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: updateLists
              method: PUT
              path: /lists/{id}
              description: "Update a list's name or description."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The list ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deleteLists
              method: DELETE
              path: /lists/{id}
              description: "Delete a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The list ID to delete"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: list-members
          path: /2
          description: "Manage list members."
          operations:
            - name: getListsMembers
              method: GET
              path: /lists/{id}/members
              description: "Get the members of a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The list ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: addListsMember
              method: POST
              path: /lists/{id}/members
              description: "Add a member to a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The list ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: removeListsMemberByUserId
              method: DELETE
              path: /lists/{id}/members/{user_id}
              description: "Remove a member from a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The list ID"
                - name: user_id
                  in: path
                  type: string
                  required: true
                  description: "The user ID to remove"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: list-followers
          path: /2
          description: "Get list followers."
          operations:
            - name: getListsFollowers
              method: GET
              path: /lists/{id}/followers
              description: "Get users who follow a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The list ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: list-follows
          path: /2
          description: "Follow and unfollow lists."
          operations:
            - name: followList
              method: POST
              path: /users/{id}/followed_lists
              description: "Follow a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unfollowList
              method: DELETE
              path: /users/{id}/followed_lists/{list_id}
              description: "Unfollow a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
                - name: list_id
                  in: path
                  type: string
                  required: true
                  description: "The list ID to unfollow"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: list-pins
          path: /2
          description: "Pin and unpin lists."
          operations:
            - name: pinList
              method: POST
              path: /users/{id}/pinned_lists
              description: "Pin a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: unpinList
              method: DELETE
              path: /users/{id}/pinned_lists/{list_id}
              description: "Unpin a list."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
                - name: list_id
                  in: path
                  type: string
                  required: true
                  description: "The list ID to unpin"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: list-posts
          path: /2
          description: "Get posts from a list timeline."
          operations:
            - name: getListsPosts
              method: GET
              path: /lists/{id}/tweets
              description: "Get posts from a list's timeline."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The list ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-lists
          path: /2
          description: "Get lists associated with a user."
          operations:
            - name: getUserOwnedLists
              method: GET
              path: /users/{id}/owned_lists
              description: "Get lists owned by a user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUserListMemberships
              method: GET
              path: /users/{id}/list_memberships
              description: "Get lists a user is a member of."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUserFollowedLists
              method: GET
              path: /users/{id}/followed_lists
              description: "Get lists a user follows."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUserPinnedLists
              method: GET
              path: /users/{id}/pinned_lists
              description: "Get lists pinned by a user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The user ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: x-lists-rest
      resources:
        - path: /v1/lists
          name: lists
          description: "Create lists"
          operations:
            - method: POST
              name: createLists
              description: "Create a new list"
              call: "x-lists.createLists"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists/{id}
          name: list
          description: "Manage a specific list"
          operations:
            - method: GET
              name: getListsById
              description: "Get a list by ID"
              call: "x-lists.getListsById"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: PUT
              name: updateLists
              description: "Update a list"
              call: "x-lists.updateLists"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: deleteLists
              description: "Delete a list"
              call: "x-lists.deleteLists"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists/{id}/followers
          name: list-followers
          description: "Get list followers"
          operations:
            - method: GET
              name: getListsFollowers
              description: "Get users following a list"
              call: "x-lists.getListsFollowers"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists/{id}/members
          name: list-members
          description: "Manage list members"
          operations:
            - method: GET
              name: getListsMembers
              description: "Get list members"
              call: "x-lists.getListsMembers"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: addListsMember
              description: "Add a member to a list"
              call: "x-lists.addListsMember"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists/{id}/members/{user_id}
          name: list-member
          description: "Remove a list member"
          operations:
            - method: DELETE
              name: removeListsMemberByUserId
              description: "Remove a member from a list"
              call: "x-lists.removeListsMemberByUserId"
              with:
                id: "rest.id"
                user_id: "rest.user_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/lists/{id}/posts
          name: list-posts
          description: "Get list posts"
          operations:
            - method: GET
              name: getListsPosts
              description: "Get posts from a list timeline"
              call: "x-lists.getListsPosts"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/followed-lists
          name: user-followed-lists
          description: "Manage followed lists"
          operations:
            - method: POST
              name: followList
              description: "Follow a list"
              call: "x-lists.followList"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: getUserFollowedLists
              description: "Get followed lists"
              call: "x-lists.getUserFollowedLists"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/followed-lists/{list_id}
          name: unfollow-list
          description: "Unfollow a list"
          operations:
            - method: DELETE
              name: unfollowList
              description: "Unfollow a list"
              call: "x-lists.unfollowList"
              with:
                id: "rest.id"
                list_id: "rest.list_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/pinned-lists
          name: user-pinned-lists
          description: "Manage pinned lists"
          operations:
            - method: POST
              name: pinList
              description: "Pin a list"
              call: "x-lists.pinList"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: getUserPinnedLists
              description: "Get pinned lists"
              call: "x-lists.getUserPinnedLists"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/pinned-lists/{list_id}
          name: unpin-list
          description: "Unpin a list"
          operations:
            - method: DELETE
              name: unpinList
              description: "Unpin a list"
              call: "x-lists.unpinList"
              with:
                id: "rest.id"
                list_id: "rest.list_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/owned-lists
          name: user-owned-lists
          description: "Get owned lists"
          operations:
            - method: GET
              name: getUserOwnedLists
              description: "Get lists owned by user"
              call: "x-lists.getUserOwnedLists"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/list-memberships
          name: user-list-memberships
          description: "Get list memberships"
          operations:
            - method: GET
              name: getUserListMemberships
              description: "Get lists user is a member of"
              call: "x-lists.getUserListMemberships"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: x-lists-mcp
      transport: http
      tools:
        - name: createLists
          description: "Create a new list on X"
          hints:
            readOnly: false
            idempotent: false
          call: "x-lists.createLists"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getListsById
          description: "Get a list by its ID"
          hints:
            readOnly: true
            idempotent: true
          call: "x-lists.getListsById"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: updateLists
          description: "Update a list's name or description"
          hints:
            readOnly: false
            idempotent: true
          call: "x-lists.updateLists"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deleteLists
          description: "Delete a list"
          hints:
            readOnly: false
            destructive: true
          call: "x-lists.deleteLists"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getListsFollowers
          description: "Get users who follow a list"
          hints:
            readOnly: true
            idempotent: true
          call: "x-lists.getListsFollowers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getListsMembers
          description: "Get the members of a list"
          hints:
            readOnly: true
            idempotent: true
          call: "x-lists.getListsMembers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: addListsMember
          description: "Add a member to a list"
          hints:
            readOnly: false
            idempotent: false
          call: "x-lists.addListsMember"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: removeListsMemberByUserId
          description: "Remove a member from a list"
          hints:
            readOnly: false
            destructive: true
          call: "x-lists.removeListsMemberByUserId"
          with:
            id: "tools.id"
            user_id: "tools.user_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: followList
          description: "Follow a list"
          hints:
            readOnly: false
            idempotent: false
          call: "x-lists.followList"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unfollowList
          description: "Unfollow a list"
          hints:
            readOnly: false
            destructive: true
          call: "x-lists.unfollowList"
          with:
            id: "tools.id"
            list_id: "tools.list_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: pinList
          description: "Pin a list"
          hints:
            readOnly: false
            idempotent: false
          call: "x-lists.pinList"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: unpinList
          description: "Unpin a list"
          hints:
            readOnly: false
            destructive: true
          call: "x-lists.unpinList"
          with:
            id: "tools.id"
            list_id: "tools.list_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getListsPosts
          description: "Get posts from a list's timeline"
          hints:
            readOnly: true
            idempotent: true
          call: "x-lists.getListsPosts"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUserOwnedLists
          description: "Get lists owned by a user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-lists.getUserOwnedLists"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUserListMemberships
          description: "Get lists a user is a member of"
          hints:
            readOnly: true
            idempotent: true
          call: "x-lists.getUserListMemberships"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUserFollowedLists
          description: "Get lists a user follows"
          hints:
            readOnly: true
            idempotent: true
          call: "x-lists.getUserFollowedLists"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUserPinnedLists
          description: "Get lists pinned by a user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-lists.getUserPinnedLists"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
