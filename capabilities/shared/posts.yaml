naftiko: "1.0.0-alpha1"

info:
  label: "X API Posts"
  description: "Create, retrieve, search, and manage posts (tweets) on X, including analytics, timelines, quote posts, and reply moderation."
  tags:
    - X API
    - Posts
    - Tweets
    - Content
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      X_API_BEARER_TOKEN: X_API_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: x-posts
      baseUri: https://api.x.com
      description: "X API v2 endpoints for posts (tweets) management."
      authentication:
        type: bearer
        token: "{{X_API_BEARER_TOKEN}}"
      resources:
        - name: posts
          path: /2
          description: "Create, retrieve, and delete posts."
          operations:
            - name: createPosts
              method: POST
              path: /tweets
              description: "Create a new post (tweet)."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPostsByIds
              method: GET
              path: /tweets
              description: "Retrieve multiple posts by their IDs."
              inputParameters:
                - name: ids
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated list of post IDs"
                - name: tweet.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of tweet fields to return"
                - name: expansions
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of expansions"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: deletePostById
              method: DELETE
              path: /tweets/{id}
              description: "Delete a post by its ID."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the post to delete"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: post-analytics
          path: /2
          description: "Retrieve analytics and insights for posts."
          operations:
            - name: getPostsAnalytics
              method: GET
              path: /tweets/{id}/analytics
              description: "Get analytics data for a specific post."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the post"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getInsights28Hr
              method: GET
              path: /insights/tweets/28hr
              description: "Get post insights for the last 28 hours."
              inputParameters:
                - name: tweet.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of tweet fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getInsightsHistorical
              method: GET
              path: /insights/tweets/historical
              description: "Get historical post insights."
              inputParameters:
                - name: tweet.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of tweet fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: post-search
          path: /2
          description: "Search for posts using queries."
          operations:
            - name: searchPostsRecent
              method: POST
              path: /tweets/search/recent
              description: "Search for posts from the last 7 days."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: searchPostsAll
              method: POST
              path: /tweets/search/all
              description: "Search the full archive of posts."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: post-counts
          path: /2
          description: "Get counts of posts matching a query."
          operations:
            - name: getPostsCountsRecent
              method: GET
              path: /tweets/counts/recent
              description: "Get counts of posts matching a query from the last 7 days."
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: true
                  description: "Search query for matching posts"
                - name: granularity
                  in: query
                  type: string
                  required: false
                  description: "Granularity of count results (minute, hour, day)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPostsCountsAll
              method: GET
              path: /tweets/counts/all
              description: "Get counts of posts matching a query from the full archive."
              inputParameters:
                - name: query
                  in: query
                  type: string
                  required: true
                  description: "Search query for matching posts"
                - name: granularity
                  in: query
                  type: string
                  required: false
                  description: "Granularity of count results (minute, hour, day)"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: timelines
          path: /2
          description: "Retrieve user timelines and mentions."
          operations:
            - name: getUserTimeline
              method: GET
              path: /users/{id}/tweets
              description: "Get posts authored by a specific user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (1-100)"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUserMentions
              method: GET
              path: /users/{id}/mentions
              description: "Get posts mentioning a specific user."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (1-100)"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getUserHomeTimeline
              method: GET
              path: /users/{id}/timelines/reverse_chronological
              description: "Get the authenticated user's home timeline."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The authenticated user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (1-100)"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: post-engagement
          path: /2
          description: "Get engagement data for posts."
          operations:
            - name: getPostsQuotePosts
              method: GET
              path: /tweets/{id}/quote_tweets
              description: "Get posts that quote a specific post."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The post ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPostsRepostedBy
              method: GET
              path: /tweets/{id}/retweeted_by
              description: "Get users who reposted a specific post."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The post ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getPostsLikingUsers
              method: GET
              path: /tweets/{id}/liking_users
              description: "Get users who liked a specific post."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The post ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: post-moderation
          path: /2
          description: "Moderate post replies."
          operations:
            - name: hidePostsReply
              method: PUT
              path: /tweets/{id}/hidden
              description: "Hide or unhide a reply to a post."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "The reply post ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: x-posts-rest
      resources:
        - path: /v1/posts
          name: posts
          description: "Create and retrieve posts"
          operations:
            - method: POST
              name: createPosts
              description: "Create a new post"
              call: "x-posts.createPosts"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: getPostsByIds
              description: "Retrieve posts by IDs"
              call: "x-posts.getPostsByIds"
              with:
                ids: "rest.ids"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/{id}
          name: post
          description: "Manage a specific post"
          operations:
            - method: DELETE
              name: deletePostById
              description: "Delete a post"
              call: "x-posts.deletePostById"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/{id}/analytics
          name: post-analytics
          description: "Get post analytics"
          operations:
            - method: GET
              name: getPostsAnalytics
              description: "Get analytics for a post"
              call: "x-posts.getPostsAnalytics"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/insights/28hr
          name: insights-28hr
          description: "Get 28-hour post insights"
          operations:
            - method: GET
              name: getInsights28Hr
              description: "Get post insights for last 28 hours"
              call: "x-posts.getInsights28Hr"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/insights/historical
          name: insights-historical
          description: "Get historical post insights"
          operations:
            - method: GET
              name: getInsightsHistorical
              description: "Get historical post insights"
              call: "x-posts.getInsightsHistorical"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/search/recent
          name: search-recent
          description: "Search recent posts"
          operations:
            - method: POST
              name: searchPostsRecent
              description: "Search posts from last 7 days"
              call: "x-posts.searchPostsRecent"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/search/all
          name: search-all
          description: "Search all posts"
          operations:
            - method: POST
              name: searchPostsAll
              description: "Search full archive of posts"
              call: "x-posts.searchPostsAll"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/counts/recent
          name: counts-recent
          description: "Get recent post counts"
          operations:
            - method: GET
              name: getPostsCountsRecent
              description: "Get counts from last 7 days"
              call: "x-posts.getPostsCountsRecent"
              with:
                query: "rest.query"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/counts/all
          name: counts-all
          description: "Get all post counts"
          operations:
            - method: GET
              name: getPostsCountsAll
              description: "Get counts from full archive"
              call: "x-posts.getPostsCountsAll"
              with:
                query: "rest.query"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/posts
          name: user-timeline
          description: "Get user timeline"
          operations:
            - method: GET
              name: getUserTimeline
              description: "Get posts by a user"
              call: "x-posts.getUserTimeline"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/mentions
          name: user-mentions
          description: "Get user mentions"
          operations:
            - method: GET
              name: getUserMentions
              description: "Get posts mentioning a user"
              call: "x-posts.getUserMentions"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}/home-timeline
          name: home-timeline
          description: "Get home timeline"
          operations:
            - method: GET
              name: getUserHomeTimeline
              description: "Get authenticated user home timeline"
              call: "x-posts.getUserHomeTimeline"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/{id}/quote-posts
          name: quote-posts
          description: "Get quote posts"
          operations:
            - method: GET
              name: getPostsQuotePosts
              description: "Get posts quoting a specific post"
              call: "x-posts.getPostsQuotePosts"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/{id}/reposted-by
          name: reposted-by
          description: "Get reposters"
          operations:
            - method: GET
              name: getPostsRepostedBy
              description: "Get users who reposted"
              call: "x-posts.getPostsRepostedBy"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/{id}/liking-users
          name: liking-users
          description: "Get liking users"
          operations:
            - method: GET
              name: getPostsLikingUsers
              description: "Get users who liked a post"
              call: "x-posts.getPostsLikingUsers"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/posts/{id}/hidden
          name: hide-reply
          description: "Hide or unhide a reply"
          operations:
            - method: PUT
              name: hidePostsReply
              description: "Hide or unhide a reply"
              call: "x-posts.hidePostsReply"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: x-posts-mcp
      transport: http
      tools:
        - name: createPosts
          description: "Create a new post (tweet) on X"
          hints:
            readOnly: false
            idempotent: false
          call: "x-posts.createPosts"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getPostsByIds
          description: "Retrieve multiple posts by their IDs"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getPostsByIds"
          with:
            ids: "tools.ids"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deletePostById
          description: "Delete a post by its ID"
          hints:
            readOnly: false
            destructive: true
          call: "x-posts.deletePostById"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getPostsAnalytics
          description: "Get analytics data for a specific post"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getPostsAnalytics"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getInsights28Hr
          description: "Get post insights for the last 28 hours"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getInsights28Hr"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getInsightsHistorical
          description: "Get historical post insights"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getInsightsHistorical"
          outputParameters:
            - type: object
              mapping: "$."
        - name: searchPostsRecent
          description: "Search for posts from the last 7 days"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.searchPostsRecent"
          outputParameters:
            - type: object
              mapping: "$."
        - name: searchPostsAll
          description: "Search the full archive of posts"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.searchPostsAll"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getPostsCountsRecent
          description: "Get counts of posts matching a query from last 7 days"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getPostsCountsRecent"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getPostsCountsAll
          description: "Get counts of posts matching a query from full archive"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getPostsCountsAll"
          with:
            query: "tools.query"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUserTimeline
          description: "Get posts authored by a specific user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getUserTimeline"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUserMentions
          description: "Get posts mentioning a specific user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getUserMentions"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getUserHomeTimeline
          description: "Get the authenticated user's home timeline"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getUserHomeTimeline"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getPostsQuotePosts
          description: "Get posts that quote a specific post"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getPostsQuotePosts"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getPostsRepostedBy
          description: "Get users who reposted a specific post"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getPostsRepostedBy"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getPostsLikingUsers
          description: "Get users who liked a specific post"
          hints:
            readOnly: true
            idempotent: true
          call: "x-posts.getPostsLikingUsers"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: hidePostsReply
          description: "Hide or unhide a reply to a post"
          hints:
            readOnly: false
            idempotent: true
          call: "x-posts.hidePostsReply"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
