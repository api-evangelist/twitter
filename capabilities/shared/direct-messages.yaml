naftiko: "1.0.0-alpha1"

info:
  label: "X API Direct Messages"
  description: "Create, retrieve, and manage direct message conversations and events on X."
  tags:
    - X API
    - Direct Messages
    - Conversations
  created: "2026-04-17"
  modified: "2026-04-17"

binds:
  - namespace: env
    keys:
      X_API_BEARER_TOKEN: X_API_BEARER_TOKEN

capability:
  consumes:
    - type: http
      namespace: x-direct-messages
      baseUri: https://api.x.com
      description: "X API v2 endpoints for direct messages and conversations."
      authentication:
        type: bearer
        token: "{{X_API_BEARER_TOKEN}}"
      resources:
        - name: conversations
          path: /2
          description: "Create and manage direct message conversations."
          operations:
            - name: createDirectMessagesConversation
              method: POST
              path: /dm_conversations
              description: "Create a new group DM conversation."
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createDirectMessagesByParticipantId
              method: POST
              path: /dm_conversations/with/{participant_id}/messages
              description: "Send a direct message to a user by participant ID, creating a 1-1 conversation if needed."
              inputParameters:
                - name: participant_id
                  in: path
                  type: string
                  required: true
                  description: "The participant user ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: createDirectMessagesByConversationId
              method: POST
              path: /dm_conversations/{dm_conversation_id}/messages
              description: "Send a direct message to an existing conversation."
              inputParameters:
                - name: dm_conversation_id
                  in: path
                  type: string
                  required: true
                  description: "The DM conversation ID"
              body:
                type: json
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: events
          path: /2
          description: "Retrieve direct message events."
          operations:
            - name: getDirectMessagesEvents
              method: GET
              path: /dm_events
              description: "Get recent DM events for the authenticated user."
              inputParameters:
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (1-100)"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
                - name: dm_event.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of DM event fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getDirectMessagesEventsByConversationId
              method: GET
              path: /dm_conversations/{dm_conversation_id}/dm_events
              description: "Get DM events for a specific conversation."
              inputParameters:
                - name: dm_conversation_id
                  in: path
                  type: string
                  required: true
                  description: "The DM conversation ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (1-100)"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getDirectMessagesEventsByParticipantId
              method: GET
              path: /dm_conversations/with/{participant_id}/dm_events
              description: "Get DM events for a 1-1 conversation with a specific user."
              inputParameters:
                - name: participant_id
                  in: path
                  type: string
                  required: true
                  description: "The participant user ID"
                - name: max_results
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results (1-100)"
                - name: pagination_token
                  in: query
                  type: string
                  required: false
                  description: "Token for pagination"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: getDirectMessagesEventsById
              method: GET
              path: /dm_events/{event_id}
              description: "Get a specific DM event by its ID."
              inputParameters:
                - name: event_id
                  in: path
                  type: string
                  required: true
                  description: "The DM event ID"
                - name: dm_event.fields
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated list of DM event fields"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: media
          path: /2
          description: "Download media from DM conversations."
          operations:
            - name: dmConversationsMediaDownload
              method: GET
              path: /dm_conversations/{dm_conversation_id}/media/{media_id}
              description: "Download media from a DM conversation."
              inputParameters:
                - name: dm_conversation_id
                  in: path
                  type: string
                  required: true
                  description: "The DM conversation ID"
                - name: media_id
                  in: path
                  type: string
                  required: true
                  description: "The media ID to download"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: delete
          path: /2
          description: "Delete direct messages."
          operations:
            - name: deleteDirectMessageById
              method: DELETE
              path: /dm_events/{event_id}
              description: "Delete a direct message event by its ID."
              inputParameters:
                - name: event_id
                  in: path
                  type: string
                  required: true
                  description: "The DM event ID to delete"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8103
      namespace: x-direct-messages-rest
      resources:
        - path: /v1/dm/conversations
          name: conversations
          description: "Create DM conversations"
          operations:
            - method: POST
              name: createDirectMessagesConversation
              description: "Create a new group DM conversation"
              call: "x-direct-messages.createDirectMessagesConversation"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dm/conversations/with/{participant_id}/messages
          name: dm-by-participant
          description: "Send DM to a user"
          operations:
            - method: POST
              name: createDirectMessagesByParticipantId
              description: "Send a DM to a user"
              call: "x-direct-messages.createDirectMessagesByParticipantId"
              with:
                participant_id: "rest.participant_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dm/conversations/{dm_conversation_id}/messages
          name: dm-by-conversation
          description: "Send DM to a conversation"
          operations:
            - method: POST
              name: createDirectMessagesByConversationId
              description: "Send a DM to an existing conversation"
              call: "x-direct-messages.createDirectMessagesByConversationId"
              with:
                dm_conversation_id: "rest.dm_conversation_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dm/events
          name: dm-events
          description: "Get DM events"
          operations:
            - method: GET
              name: getDirectMessagesEvents
              description: "Get recent DM events"
              call: "x-direct-messages.getDirectMessagesEvents"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dm/conversations/{dm_conversation_id}/events
          name: dm-events-by-conversation
          description: "Get DM events for a conversation"
          operations:
            - method: GET
              name: getDirectMessagesEventsByConversationId
              description: "Get DM events by conversation"
              call: "x-direct-messages.getDirectMessagesEventsByConversationId"
              with:
                dm_conversation_id: "rest.dm_conversation_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dm/conversations/with/{participant_id}/events
          name: dm-events-by-participant
          description: "Get DM events with a user"
          operations:
            - method: GET
              name: getDirectMessagesEventsByParticipantId
              description: "Get DM events by participant"
              call: "x-direct-messages.getDirectMessagesEventsByParticipantId"
              with:
                participant_id: "rest.participant_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dm/events/{event_id}
          name: dm-event
          description: "Get or delete a DM event"
          operations:
            - method: GET
              name: getDirectMessagesEventsById
              description: "Get a specific DM event"
              call: "x-direct-messages.getDirectMessagesEventsById"
              with:
                event_id: "rest.event_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: deleteDirectMessageById
              description: "Delete a DM event"
              call: "x-direct-messages.deleteDirectMessageById"
              with:
                event_id: "rest.event_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dm/conversations/{dm_conversation_id}/media/{media_id}
          name: dm-media
          description: "Download DM media"
          operations:
            - method: GET
              name: dmConversationsMediaDownload
              description: "Download media from a DM"
              call: "x-direct-messages.dmConversationsMediaDownload"
              with:
                dm_conversation_id: "rest.dm_conversation_id"
                media_id: "rest.media_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: x-direct-messages-mcp
      transport: http
      tools:
        - name: createDirectMessagesConversation
          description: "Create a new group DM conversation"
          hints:
            readOnly: false
            idempotent: false
          call: "x-direct-messages.createDirectMessagesConversation"
          outputParameters:
            - type: object
              mapping: "$."
        - name: createDirectMessagesByParticipantId
          description: "Send a direct message to a user by participant ID"
          hints:
            readOnly: false
            idempotent: false
          call: "x-direct-messages.createDirectMessagesByParticipantId"
          with:
            participant_id: "tools.participant_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: createDirectMessagesByConversationId
          description: "Send a direct message to an existing conversation"
          hints:
            readOnly: false
            idempotent: false
          call: "x-direct-messages.createDirectMessagesByConversationId"
          with:
            dm_conversation_id: "tools.dm_conversation_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getDirectMessagesEvents
          description: "Get recent DM events for the authenticated user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-direct-messages.getDirectMessagesEvents"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getDirectMessagesEventsByConversationId
          description: "Get DM events for a specific conversation"
          hints:
            readOnly: true
            idempotent: true
          call: "x-direct-messages.getDirectMessagesEventsByConversationId"
          with:
            dm_conversation_id: "tools.dm_conversation_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getDirectMessagesEventsByParticipantId
          description: "Get DM events for a 1-1 conversation with a specific user"
          hints:
            readOnly: true
            idempotent: true
          call: "x-direct-messages.getDirectMessagesEventsByParticipantId"
          with:
            participant_id: "tools.participant_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: getDirectMessagesEventsById
          description: "Get a specific DM event by its ID"
          hints:
            readOnly: true
            idempotent: true
          call: "x-direct-messages.getDirectMessagesEventsById"
          with:
            event_id: "tools.event_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: dmConversationsMediaDownload
          description: "Download media from a DM conversation"
          hints:
            readOnly: true
            idempotent: true
          call: "x-direct-messages.dmConversationsMediaDownload"
          with:
            dm_conversation_id: "tools.dm_conversation_id"
            media_id: "tools.media_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: deleteDirectMessageById
          description: "Delete a direct message event by its ID"
          hints:
            readOnly: false
            destructive: true
          call: "x-direct-messages.deleteDirectMessageById"
          with:
            event_id: "tools.event_id"
          outputParameters:
            - type: object
              mapping: "$."
