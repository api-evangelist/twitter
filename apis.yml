aid: twitter
name: X (Twitter)
description: >-
  X (formerly Twitter) is a social media platform providing APIs for accessing and
  integrating with posts, users, spaces, direct messages, lists, media, trends, and
  real-time streaming data. The X API enables developers to build applications that
  read and write X data, manage advertising campaigns, and subscribe to real-time
  activity events. Available through pay-per-use credit-based pricing with enterprise
  options for high-volume access.
type: Index
image: https://abs.twimg.com/favicons/twitter.ico
url: https://raw.githubusercontent.com/api-evangelist/twitter/refs/heads/main/apis.yml
created: '2025-07-29'
modified: '2026-04-17'
specificationVersion: '0.19'
