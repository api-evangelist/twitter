  - Streaming
  - Advertising
  - Content
apis:
  - aid: twitter:x-api
    name: X API
    description: >-
      The core X API providing programmatic access to posts, users, spaces, lists,
      direct messages, bookmarks, likes, reposts, follows, blocks, mutes, trends,
      communities, and compliance data. Supports post creation, search (recent and
      full-archive), timelines, filtered streams, sampled streams, and real-time
      data access. Uses OAuth 2.0 with PKCE or OAuth 1.0a authentication with
      credit-based pay-per-use pricing.
    image: https://abs.twimg.com/favicons/twitter.ico
    humanURL: https://docs.x.com/x-api
    baseURL: https://api.x.com/2
    properties:
      - type: Documentation
        url: https://docs.x.com/x-api
      - type: GettingStarted
        url: https://docs.x.com/x-api/getting-started/make-your-first-request
      - type: APIReference
        url: https://docs.x.com/x-api
      - type: Authentication
        url: https://docs.x.com/resources/fundamentals/authentication
      - type: RateLimits
        url: https://docs.x.com/x-api/fundamentals/rate-limits
      - type: SDK
        url: https://docs.x.com/sdks-and-tools/python-xdk
        title: Python XDK
      - type: SDK
        url: https://docs.x.com/sdks-and-tools/typescript-xdk
        title: TypeScript XDK
      - type: OpenAPI
        url: openapi/x-api-openapi.json
    tags:
      - Posts
      - Users
      - Spaces
      - Lists
      - Direct Messages
      - Streaming
      - Search
      - Timelines
  - aid: twitter:x-ads-api
    name: X Ads API
    description: >-
      The X Ads API enables programmatic management of advertising campaigns on the
      X platform including campaign creation and scheduling, custom audience building,
      creative management (draft posts, cards, media), and analytics retrieval for
      campaign performance metrics. Supports both synchronous and asynchronous
      analytics endpoints for reporting.
    image: https://abs.twimg.com/favicons/twitter.ico
    humanURL: https://docs.x.com/x-ads-api
    baseURL: https://ads-api.x.com
    properties:
      - type: Documentation
        url: https://docs.x.com/x-ads-api
      - type: GettingStarted
        url: https://docs.x.com/x-ads-api/getting-started/create-a-campaign
      - type: RateLimits
        url: https://docs.x.com/x-ads-api/fundamentals/rate-limiting
      - type: PostmanCollection
        url: postman/x-ads-api-postman-collection.json
    tags:
      - Advertising
      - Campaigns
      - Analytics
      - Audiences
      - Creatives
  - aid: twitter:x-activity-api
    name: X Activity API
    description: >-
      The X Activity API provides real-time activity event subscriptions with
      sub-second delivery via streaming or webhooks. Subscribe to profile updates,
      follows, likes, reposts, and other user activity events. Recently exited
      beta and is now generally available.
    image: https://abs.twimg.com/favicons/twitter.ico
    humanURL: https://docs.x.com/x-activity-api
    baseURL: https://api.x.com
    properties:
      - type: Documentation
        url: https://docs.x.com/x-activity-api
    tags:
      - Activity
      - Events
      - Real-Time
      - Streaming
      - Webhooks
