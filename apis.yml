apis:
  - aid: twitter:x-api
    name: X API
    description: The core X API providing programmatic access to posts, users, spaces, lists, direct messages, bookmarks, likes,
      reposts, follows, blocks, mutes, trends, communities, and compliance data. Supports post creation, search (recent and
      full-archive), timelines, filtered streams, sampled streams, and real-time data access. Uses OAuth 2.0 with PKCE or OAuth
      1.0a authentication with credit-based pay-per-use pricing.
    image: https://abs.twimg.com/favicons/twitter.ico
    humanURL: https://docs.x.com/x-api
