specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: X (Twitter)
providerId: twitter
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Social Media
  - Developer API
  - Rate Limiting
description: X API v2 enforces rate limits on top of its pay-per-call pricing. Limits are scoped per endpoint
  with per-app (Bearer) and per-user (OAuth) buckets, typically over 15-minute or 24-hour windows. Headers
  expose the live limit, remaining, and reset timestamp. When a limit is exceeded, the API returns HTTP
  429 with error code 88 ("Rate limit exceeded"); recovery is via the reset timestamp and exponential
  backoff.
sources:
  - https://docs.x.com/x-api/fundamentals/rate-limits
headers:
  limit: x-rate-limit-limit
  remaining: x-rate-limit-remaining
  reset: x-rate-limit-reset
responseCodes:
  throttled: 429
limits:
  - name: Tweet lookup (app)
    scope: app (Bearer token)
    metric: requests_per_15_minutes
    limit: 3500
    timeFrame: minute
    notes: 15-minute window.
  - name: Tweet lookup (user)
    scope: user (OAuth)
    metric: requests_per_15_minutes
    limit: 5000
    timeFrame: minute
    notes: 15-minute window.
  - name: Recent search (app)
    scope: app (Bearer token)
    metric: requests_per_15_minutes
    limit: 450
    timeFrame: minute
    notes: 15-minute window.
  - name: Recent search (user)
    scope: user (OAuth)
    metric: requests_per_15_minutes
    limit: 300
    timeFrame: minute
    notes: 15-minute window.
  - name: Post creation (app)
    scope: app (Bearer token)
    metric: requests_per_24_hours
    limit: 10000
    timeFrame: day
    notes: 24-hour window.
  - name: Post creation (user)
    scope: user (OAuth)
    metric: requests_per_15_minutes
    limit: 100
    timeFrame: minute
    notes: 15-minute window.
  - name: User lookup (app)
    scope: app (Bearer token)
    metric: requests_per_15_minutes
    limit: 300
    timeFrame: minute
    notes: 15-minute window.
  - name: User lookup (user)
    scope: user (OAuth)
    metric: requests_per_15_minutes
    limit: 900
    timeFrame: minute
    notes: 15-minute window.
  - name: Follow management (user)
    scope: user (OAuth)
    metric: requests_per_15_minutes
    limit: 50
    timeFrame: minute
    notes: User-only; not available with app tokens.
  - name: Direct Messages - retrieval (user)
    scope: user (OAuth)
    metric: requests_per_15_minutes
    limit: 15
    timeFrame: minute
    notes: User-only.
  - name: Direct Messages - creation
    scope: app/user
    metric: requests_per_24_hours
    limit: 1440
    timeFrame: day
    notes: 24-hour window; available on both app and user contexts.
  - name: Media upload init (app)
    scope: app (Bearer token)
    metric: requests_per_24_hours
    limit: 180000
    timeFrame: day
    notes: 24-hour window.
  - name: Media upload init (user)
    scope: user (OAuth)
    metric: requests_per_15_minutes
    limit: 1875
    timeFrame: minute
    notes: 15-minute window.
policies:
  - name: 15-Minute / 24-Hour Windows
    description: Most endpoints reset on 15-minute windows; high-volume actions (post creation, DM creation,
      media upload init) use 24-hour windows. Use x-rate-limit-reset to determine wait time.
  - name: App vs User Buckets
    description: Each endpoint has separate per-app (Bearer) and per-user (OAuth) buckets; choose the
      auth context that fits your traffic shape and treat them as independent budgets.
  - name: Error Code 88 Recovery
    description: A 429 response carries error code 88 ("Rate limit exceeded"); recover by waiting until
      x-rate-limit-reset and applying exponential backoff before retrying.
  - name: Streaming for Real-Time
    description: For high-volume real-time use cases, prefer streaming endpoints over polling to stay
      within the 15-minute / 24-hour windows.
  - name: Caching and Distribution
    description: Cache responses, monitor remaining, and distribute requests across the time window to
      avoid bursting against the limit.
maintainers:
