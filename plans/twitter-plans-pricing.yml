specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: X (Twitter)
providerId: twitter
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Social Media
  - Developer API
  - Pay-Per-Use
  - Microblogging
description: X API v2 is sold on a pay-per-usage credit model — developers buy credits in the Developer
  Console and the platform deducts them per request. There are no contracts, subscriptions, or minimums;
  read operations on most resources cost $0.005 per resource, identity-adjacent reads (users, DMs, follows,
  trends) cost $0.010, and write operations are $0.015 per request (or $0.200 with a URL). Owned reads
  (your own posts, bookmarks, followers) are $0.001 per resource. Duplicate requests within 24 hours are
  charged once. Spending limits and auto-recharge are configurable.
sources:
  - https://docs.x.com/x-api/getting-started/pricing
  - https://docs.x.com/x-api/getting-started/about-x-api
plans:
  - id: twitter-pay-per-usage
    name: X API Pay-Per-Usage
    type: pay-as-you-go
    description: Credit-based pay-per-call X API v2. Buy credits in the Developer Console; each request
      deducts the documented per-resource or per-request price. Spending limits and deduplication are
      built in.
    entries:
      - label: Read - Posts / Lists / Spaces / Communities / Notes / Media / Analytics
        name: read_content_resources
        type: metered
        metric: resource
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0.005'
        userMultiplied: false
      - label: Read - Users / DMs / Following / Followers / Trends
        name: read_identity_resources
        type: metered
        metric: resource
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0.010'
        userMultiplied: false
      - label: Owned Reads
        name: owned_reads
        type: metered
        metric: resource
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0.001'
        userMultiplied: false
      - label: Write - Content Creation
        name: write_content
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0.015'
        userMultiplied: false
      - label: Write - Content with URL
        name: write_content_with_url
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0.200'
        userMultiplied: false
      - label: Write - Interactions / Bookmarks
        name: write_interactions
        type: metered
        metric: request
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0.005-$0.015'
        userMultiplied: false
      - label: Deduplication Window
        name: deduplication_window
        type: flat
        metric: hour
        limit: 24
        timeFrame: day
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Auto-Recharge / Spending Limit
        name: cost_controls
        type: flat
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: No Contracts
      - name: No Subscriptions
      - name: No Minimum Spend
      - name: Real-Time Usage Tracking in Developer Console
      - name: 24-Hour Request Deduplication
      - name: Configurable Spending Limit
      - name: Configurable Auto-Recharge
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
