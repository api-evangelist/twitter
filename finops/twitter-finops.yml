specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: X (Twitter)
providerId: twitter
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Social Media
  - Developer API
  - Pay-Per-Use
  - FinOps
  - FOCUS
description: FOCUS-aligned FinOps for the X API v2 — credit-based pay-per-call with per-resource read
  pricing ($0.001 owned / $0.005 content / $0.010 identity), per-request write pricing ($0.015 standard,
  $0.200 with URL), 24-hour request deduplication, and configurable spending limits / auto-recharge in
  the Developer Console.
sources:
  - https://docs.x.com/x-api/getting-started/pricing
  - https://docs.x.com/x-api/getting-started/about-x-api
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: X Corp.
serviceCategory: Social Media Developer API
billingModel:
  pricingCategory: Pay-As-You-Go
  billingFrequency: On-Demand
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
focusColumns:
  ServiceName: X API
  ServiceCategory: Social Media Developer API
  ProviderName: X (Twitter)
  PublisherName: X Corp.
  InvoiceIssuerName: X Corp.
  BillingCurrency: USD
meters:
  - name: read_resources_content
    description: Read of post / list / space / community / note / media / analytics resources at $0.005
      each.
    unit: resource
    aggregation: sum
    dimensions:
      - resource_type
      - app
  - name: read_resources_identity
    description: Read of user / DM / following / followers / trends resources at $0.010 each.
    unit: resource
    aggregation: sum
    dimensions:
      - resource_type
      - app
  - name: owned_reads
    description: Reads against your own data (own posts, bookmarks, followers) at $0.001 each.
    unit: resource
    aggregation: sum
    dimensions:
      - resource_type
      - app
  - name: write_requests_standard
    description: Content-creation and basic write/interaction requests at $0.015 (interactions $0.005-$0.015).
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - app
  - name: write_requests_with_url
    description: Content-creation requests that include a URL at $0.200 each.
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - app
  - name: credits_purchased
    description: Credits purchased upfront in the Developer Console; consumed by request meters.
    unit: USD
    aggregation: sum
    dimensions:
      - app
principles:
  - name: Visibility
    description: Use the X Developer Console real-time tracking to monitor credit balance, per-endpoint
      cost, and request counts; rate-limit headers (x-rate-limit-remaining / reset) provide an additional
      governance signal.
  - name: Allocation
    description: Allocate spend per Developer Console app (client) — each app has its own credit balance,
      spending limit, and auto-recharge. Map apps to product features so credit consumption charges back
      cleanly.
  - name: Optimization
    description: Lever the 24-hour request-deduplication window (do not re-fetch the same resource within
      24 hours), prefer owned reads ($0.001) over content/identity reads where applicable, avoid posting
      with URLs ($0.200) when a plain post ($0.015) suffices, and use streaming endpoints for real-time
      data instead of poll-driven reads.
  - name: Accountability
    description: Each app's credit balance has an owner who configures the spending limit and auto-recharge
      threshold; finance reviews credit-purchase invoices and the per-app monthly burn rate.
maintainers:
