  startedAt: DateTime
  endedAt: DateTime
  scheduledStart: DateTime
  participantCount: Int
  subscriberCount: Int
  speakerIds: [ID]
  speakers: [SpaceParticipant]
  invitedUserIds: [ID]
  invitedUsers: [SpaceInvitedUser]
  isTicketed: Boolean
  lang: String
  topics: [SpaceTopic]
  updatedAt: DateTime
}

type SpaceTopic {
  id: ID!
  name: String!
  description: String
}

type SpaceParticipant {
  userId: ID!
