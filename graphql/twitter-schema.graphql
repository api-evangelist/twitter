  inReplyToTweetId: ID
  quoteTweetId: ID
  mediaIds: [ID]
  pollOptions: [String]
  pollDurationMinutes: Int
  geo: TweetGeoInput
  directMessageDeepLink: String
  forSuperFollowersOnly: Boolean
}

input TweetGeoInput {
  placeId: ID
}

input CreateListInput {
  name: String!
  description: String
  private: Boolean
}

input UpdateListInput {
  name: String
  description: String
  private: Boolean
}

input CreateStreamRuleInput {
  value: String!
  tag: String
}

input SendDirectMessageInput {
  conversationId: ID
  participantId: ID
  text: String!
  mediaId: ID
  referencedTweetId: ID
}

input CreateComplianceJobInput {
  type: ComplianceJobType!
  resumeToken: String
}

# ==========================================
# QUERY
# ==========================================

type Query {
  tweet(id: ID!, expansions: [String], tweetFields: [String], userFields: [String], mediaFields: [String], placeFields: [String], pollFields: [String]): TweetData
  tweets(ids: [ID!]!, expansions: [String], tweetFields: [String], userFields: [String], mediaFields: [String]): SearchResult
  searchRecent(query: String!, maxResults: Int, nextToken: String, startTime: DateTime, endTime: DateTime, sinceId: ID, untilId: ID, expansions: [String], tweetFields: [String], userFields: [String]): SearchResult
  searchAll(query: String!, maxResults: Int, nextToken: String, startTime: DateTime, endTime: DateTime, sinceId: ID, untilId: ID, expansions: [String], tweetFields: [String], userFields: [String]): SearchResult
  user(id: ID!, expansions: [String], userFields: [String], tweetFields: [String]): UserData
  userByUsername(username: String!, expansions: [String], userFields: [String], tweetFields: [String]): UserData
  users(ids: [ID!]!, expansions: [String], userFields: [String]): UserMentions
  usersByUsernames(usernames: [String!]!, expansions: [String], userFields: [String]): UserMentions
  userTimeline(userId: ID!, maxResults: Int, paginationToken: String, startTime: DateTime, endTime: DateTime, expansions: [String], tweetFields: [String]): TimelinesResult
  userMentionsTimeline(userId: ID!, maxResults: Int, paginationToken: String, startTime: DateTime, endTime: DateTime, expansions: [String], tweetFields: [String]): TimelinesResult
  userLikedTweets(userId: ID!, maxResults: Int, paginationToken: String, expansions: [String], tweetFields: [String]): TimelinesResult
  userBookmarks(userId: ID!, maxResults: Int, paginationToken: String, expansions: [String], tweetFields: [String]): TimelinesResult
  userFollowers(userId: ID!, maxResults: Int, paginationToken: String, expansions: [String], userFields: [String]): UserMentions
  userFollowing(userId: ID!, maxResults: Int, paginationToken: String, expansions: [String], userFields: [String]): UserMentions
  userBlockedUsers(userId: ID!, maxResults: Int, paginationToken: String): UserMentions
  userMutedUsers(userId: ID!, maxResults: Int, paginationToken: String): UserMentions
  list(id: ID!, expansions: [String], listFields: [String], userFields: [String]): List
  lists(userId: ID!, maxResults: Int, paginationToken: String): ListMember
  listMembers(listId: ID!, maxResults: Int, paginationToken: String, expansions: [String], userFields: [String]): ListMember
  listFollowers(listId: ID!, maxResults: Int, paginationToken: String, expansions: [String], userFields: [String]): ListMember
  listTweets(listId: ID!, maxResults: Int, paginationToken: String, expansions: [String], tweetFields: [String]): TimelinesResult
  space(id: ID!, expansions: [String], spaceFields: [String], userFields: [String]): Space
  spaces(ids: [ID!]!, expansions: [String], spaceFields: [String]): Space
  spacesByCreators(userIds: [ID!]!, expansions: [String], spaceFields: [String]): Space
  trends(woeid: Int): [Trend]
  streamRules: [StreamRule]
  usageStats(granularity: String): UsageTweet
  complianceJobs(type: ComplianceJobType!, status: ComplianceJobStatus): [ComplianceJob]
  complianceJob(id: ID!): ComplianceJob
  dmConversation(conversationId: ID!, maxResults: Int, paginationToken: String): DMConversation
}

# ==========================================
# MUTATION
# ==========================================

type Mutation {
  createTweet(input: CreateTweetInput!): TweetData
  deleteTweet(id: ID!): Boolean
  likeTweet(userId: ID!, tweetId: ID!): Boolean
  unlikeTweet(userId: ID!, tweetId: ID!): Boolean
  retweet(userId: ID!, tweetId: ID!): Boolean
  deleteRetweet(userId: ID!, sourceTweetId: ID!): Boolean
  bookmarkTweet(userId: ID!, tweetId: ID!): Boolean
  deleteBookmark(userId: ID!, tweetId: ID!): Boolean
  followUser(userId: ID!, targetUserId: ID!): Boolean
  unfollowUser(userId: ID!, targetUserId: ID!): Boolean
  blockUser(userId: ID!, targetUserId: ID!): Boolean
  unblockUser(userId: ID!, targetUserId: ID!): Boolean
  muteUser(userId: ID!, targetUserId: ID!): Boolean
  unmuteUser(userId: ID!, targetUserId: ID!): Boolean
  createList(input: CreateListInput!): List
  updateList(id: ID!, input: UpdateListInput!): List
  deleteList(id: ID!): Boolean
  addListMember(listId: ID!, userId: ID!): Boolean
  removeListMember(listId: ID!, userId: ID!): Boolean
  followList(userId: ID!, listId: ID!): Boolean
  unfollowList(userId: ID!, listId: ID!): Boolean
  pinList(userId: ID!, listId: ID!): Boolean
  unpinList(userId: ID!, listId: ID!): Boolean
  createStreamRule(input: CreateStreamRuleInput!): StreamRule
  deleteStreamRules(ids: [ID!]!): Boolean
  sendDirectMessage(input: SendDirectMessageInput!): DirectMessage
  createComplianceJob(input: CreateComplianceJobInput!): ComplianceJob
}

# ==========================================
# SUBSCRIPTION
# ==========================================

type Subscription {
  filteredStream: Tweet
  sampledStream: Tweet
  activityStream(userId: ID!): DMEvent
}
