# Twitter (X) API v2 - Conceptual GraphQL Schema
# Source: https://docs.x.com/x-api
# Base URL: https://api.x.com/2
# Schema type: Conceptual (REST API modeled as GraphQL)

# ==========================================
# SCALARS
# ==========================================

scalar DateTime
scalar JSON
scalar URL

# ==========================================
# ENUMS
# ==========================================

enum TweetType {
  TWEET
  RETWEET
  QUOTED_TWEET
  REPLY
}

enum ReferencedTweetType {
  RETWEETED
  QUOTED
  REPLIED_TO
}

enum MediaType {
  PHOTO
  VIDEO
  ANIMATED_GIF
}

enum SpaceState {
  LIVE
  SCHEDULED
  ENDED
}

enum ListVisibility {
  PUBLIC
  PRIVATE
}

enum ComplianceJobType {
  TWEETS
  USERS
}

enum ComplianceJobStatus {
  CREATED
  IN_PROGRESS
  FAILED
  COMPLETE
  EXPIRED
}

enum DMEventType {
  MESSAGE_CREATE
  PARTICIPANTS_JOIN
  PARTICIPANTS_LEAVE
  CONVERSATION_CREATE
}

enum PollStatus {
  OPEN
  CLOSED
}

enum ReplySettings {
  EVERYONE
  MENTIONED_USERS
  SUBSCRIBERS
  FOLLOWING
}

enum TweetFieldExpansion {
  AUTHOR_ID
  REFERENCED_TWEETS
  ATTACHMENTS
  ENTITIES
  GEO
  CONTEXT_ANNOTATIONS
  PUBLIC_METRICS
  NON_PUBLIC_METRICS
  ORGANIC_METRICS
  PROMOTED_METRICS
  WITHHELD
  LANG
  POSSIBLY_SENSITIVE
}

# ==========================================
# TWEET TYPES
# ==========================================

type Tweet {
  id: ID!
  text: String!
  authorId: ID
  author: User
  createdAt: DateTime
  conversationId: ID
  inReplyToUserId: ID
  referencedTweets: [TweetReferencedTweet]
  attachments: TweetAttachment
  entities: TweetEntity
  contextAnnotations: [TweetContextAnnotation]
  geo: TweetGeo
  lang: String
  possiblySensitive: Boolean
  publicMetrics: TweetPublicMetrics
  nonPublicMetrics: TweetNonPublicMetrics
  organicMetrics: TweetOrganicMetrics
  promotedMetrics: TweetMetrics
  replySettings: ReplySettings
  source: String
  withheld: TweetWithheld
  editControls: TweetEditControls
  noteId: ID
  tweetType: TweetType
}

type TweetData {
  data: Tweet
  includes: TweetExpansions
  errors: [Error]
}

type TweetReferencedTweet {
  type: ReferencedTweetType!
  id: ID!
  tweet: Tweet
}

type TweetAttachment {
  mediaKeys: [String]
  pollIds: [ID]
  media: [Media]
  polls: [Poll]
}

type TweetMention {
  start: Int
  end: Int
  username: String!
  id: ID
}

type TweetAnnotation {
  start: Int
  end: Int
  probability: Float
  type: String
  normalizedText: String
}

type TweetContextAnnotation {
  domain: ContextAnnotationDomain!
  entity: ContextAnnotationEntity!
}

type TweetEntity {
  urls: [TweetEntityUrl]
  hashtags: [TweetEntityHashtag]
  cashtags: [TweetEntityCashtag]
  mentions: [TweetEntityMention]
  annotations: [TweetAnnotation]
}

type TweetEntityUrl {
  start: Int
  end: Int
  url: String!
  expandedUrl: URL
  displayUrl: String
  unwoundUrl: URL
  title: String
  description: String
  images: [UrlImage]
  status: Int
}

type TweetEntityHashtag {
  start: Int
  end: Int
  tag: String!
}

type TweetEntityCashtag {
  start: Int
  end: Int
  tag: String!
}

type TweetEntityMention {
  start: Int
  end: Int
  username: String!
  id: ID
}

type TweetExpansions {
  tweets: [Tweet]
  users: [User]
  media: [Media]
  polls: [Poll]
  places: [Place]
}

type TweetPublicMetrics {
  retweetCount: Int!
  replyCount: Int!
  likeCount: Int!
  quoteCount: Int!
  bookmarkCount: Int!
  impressionCount: Int
}

type TweetNonPublicMetrics {
  impressionCount: Int
  urlLinkClicks: Int
  userProfileClicks: Int
}

type TweetOrganicMetrics {
  impressionCount: Int
  urlLinkClicks: Int
  userProfileClicks: Int
  retweetCount: Int
  replyCount: Int
  likeCount: Int
}

type TweetMetrics {
  impressionCount: Int
  urlLinkClicks: Int
  userProfileClicks: Int
  retweetCount: Int
  replyCount: Int
  likeCount: Int
}

type TweetGeo {
  placeId: ID
  coordinates: Coordinates
  place: Place
}

type TweetWithheld {
  copyright: Boolean
  countryCodes: [String]
  scope: String
}

type TweetEditControls {
  editTweetIds: [ID]
  editsRemaining: Int
  isEditEligible: Boolean
  editableUntil: DateTime
}

# ==========================================
# USER TYPES
# ==========================================

type User {
  id: ID!
  name: String!
  username: String!
  createdAt: DateTime
  description: String
  entities: UserEntities
  location: String
  pinnedTweetId: ID
  pinnedTweet: Tweet
  profileImageUrl: URL
  protected: Boolean
  publicMetrics: UserPublicMetrics
  url: URL
  verified: Boolean
  verifiedType: String
  withheld: UserWithheld
}

type UserData {
  data: User
  includes: TweetExpansions
  errors: [Error]
}

type UserEntities {
  url: UserUrl
  description: UserDescription
}

type UserUrl {
  urls: [TweetEntityUrl]
}

type UserDescription {
  urls: [TweetEntityUrl]
  hashtags: [TweetEntityHashtag]
  cashtags: [TweetEntityCashtag]
  mentions: [TweetEntityMention]
}

type UserMentions {
  data: [User]
  meta: PaginationMeta
  includes: TweetExpansions
}

type UserVerified {
  verified: Boolean!
  verifiedType: String
}

type UserProtected {
  protected: Boolean!
}

type UserPublicMetrics {
  followersCount: Int!
  followingCount: Int!
  tweetCount: Int!
  listedCount: Int!
}

type UserMetrics {
  followersCount: Int
  followingCount: Int
  tweetCount: Int
  listedCount: Int
}

type UserWithheld {
  countryCodes: [String]
  scope: String
}

